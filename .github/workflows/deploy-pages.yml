name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  maybe-fetch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check market data age
        id: check
        run: |
          FILE="public/data/market/$(date -u +%Y-%m).txt"
          if [ ! -f "$FILE" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "No market archive for current month."
            exit 0
          fi
          COMMIT_EPOCH=$(git log -1 --format=%ct -- "$FILE")
          NOW_EPOCH=$(date -u +%s)
          AGE_MIN=$(( (NOW_EPOCH - COMMIT_EPOCH) / 60 ))
          if [ "$AGE_MIN" -lt 360 ]; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "Market archive is recent (committed within 6 hours)."
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "Market archive is older than 6 hours."
          fi

      - name: Trigger fetch workflow
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run fetch-market.yml --ref master
          echo "Waiting for fetch-market workflow to start..."
          sleep 15
          RUN_ID=$(gh run list --workflow=fetch-market.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Watching run ${RUN_ID}"
          gh run watch "$RUN_ID" --exit-status

  build:
    needs: maybe-fetch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}

      - name: Add SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
