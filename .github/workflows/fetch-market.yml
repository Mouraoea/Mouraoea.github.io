name: Fetch market snapshot

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run fetch
        env:
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market/
          git diff --staged --quiet || git commit -m "chore(market): snapshot $(date -u +%Y-%m-%d)"
          git push
