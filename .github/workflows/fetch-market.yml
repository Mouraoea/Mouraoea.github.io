name: Fetch market snapshot

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Skip if snapshot is recent
        id: recent
        run: |
          FILE="public/data/market/$(date -u +%Y-%m).txt"
          if [ ! -f "$FILE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_EPOCH=$(git log -1 --format=%ct -- "$FILE")
          NOW_EPOCH=$(date -u +%s)
          AGE_MIN=$(( (NOW_EPOCH - COMMIT_EPOCH) / 60 ))
          if [ "$AGE_MIN" -lt 360 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Recent snapshot found (committed within 6 hours). Skipping fetch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run fetch
        if: steps.recent.outputs.skip != 'true'
        env:
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}

      - name: Commit snapshot
        if: steps.recent.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/data/market/ public/data/game/ public/data/recipes/
          if git diff --staged --quiet; then
            echo "::error::No data files staged. Check .gitignore and npm run fetch output."
            exit 1
          fi
          git commit -m "chore(data): snapshot $(date -u +%Y-%m-%d)"
          git push
